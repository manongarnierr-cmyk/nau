<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nau — Hub</title>
<style>
  body { font-family: sans-serif; max-width: 600px; margin: 60px auto; padding: 0 24px; color: #07202f; }
  h1 { font-size: 32px; margin-bottom: 4px; }
  .sub { color: #888; font-size: 14px; margin-bottom: 48px; }
  h2 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.12em; color: #aaa; margin: 32px 0 12px; border-top: 1px solid #eee; padding-top: 20px; }
  ul { list-style: none; padding: 0; margin: 0; }
  li { margin-bottom: 8px; }
  a { font-size: 15px; color: #1a9c87; text-decoration: none; cursor: pointer; }
  a:hover { text-decoration: underline; }
  .label { font-size: 11px; color: #fff; background: #1a9c87; padding: 2px 8px; border-radius: 20px; margin-left: 8px; vertical-align: middle; }
  #frames { display:none; margin-top:32px; }
  .frame-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
  #frame-title { font-size:14px; color:#555; }
  .close-btn { font-size:13px; color:#888; background:none; border:1px solid #ddd; padding:4px 12px; border-radius:20px; cursor:pointer; }
  .close-btn:hover { background:#f5f5f5; }
  #frame { width:100%; height:600px; border:1px solid #eee; border-radius:8px; }
</style>
</head>
<body>

<h1>nau</h1>
<p class="sub">joinnau.com — Project Hub</p>

<h2>Site</h2>
<ul>
  <li><a onclick="show('v4')">V4 — Golden Circle · Two targets</a> <span class="label">latest</span></li>
  <li><a onclick="show('v3')">V3 — Golden Circle · First attempt</a></li>
  <li><a onclick="show('v2')">V2 — Sail further</a></li>
  <li><a onclick="show('v1')">V1 — First draft</a></li>
</ul>

<h2>Affiches — Propietaris</h2>
<ul>
  <li><a onclick="show('prop-ca')">Affiche propietaris — Català</a></li>
</ul>

<h2>Affiches — Tripulants / Crew</h2>
<ul>
  <li><a onclick="show('trip-ca')">Affiche tripulants — Català</a></li>
</ul>

<div id="frames">
  <div class="frame-bar">
    <span id="frame-title"></span>
    <button class="close-btn" onclick="closeFrame()">✕ Close</button>
  </div>
  <iframe id="frame" src=""></iframe>
</div>

<script>
const pages = {
  'v4':     { title: 'V4 — Golden Circle · Two targets',   src: 'nau-landing-v4.html' },
  'v3':     { title: 'V3 — Golden Circle · First attempt', src: 'nau-landing-v3.html' },
  'v2':     { title: 'V2 — Sail further',                  src: 'nau-landing-v2.html' },
  'v1':     { title: 'V1 — First draft',                   src: 'nau-landing.html' },
  'prop-ca':{ title: 'Affiche propietaris — Català',       src: 'nau-affiche-propietaris-ca.html' },
  'trip-ca':{ title: 'Affiche tripulants — Català',        src: 'nau-affiche-tripulants-ca.html' },
};

function show(id) {
  const p = pages[id];
  if (!p) return;
  document.getElementById('frame-title').textContent = p.title;
  document.getElementById('frame').src = p.src;
  document.getElementById('frames').style.display = 'block';
  setTimeout(() => document.getElementById('frames').scrollIntoView({ behavior: 'smooth' }), 100);
}

function closeFrame() {
  document.getElementById('frames').style.display = 'none';
  document.getElementById('frame').src = '';
}
</script>

</body>
</html>
